<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>音声タブコントローラー</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>音声タブコントローラー</h1>

      <section aria-label="一括操作">
        <button id="bulk-mute-btn" type="button">一括ミュート</button>
        <button id="bulk-unmute-btn" type="button">一括解除</button>
        <p id="bulk-result" role="status" aria-live="polite"></p>
      </section>

      <section aria-label="音声タブ一覧">
        <ul id="tab-list"></ul>
        <p id="empty-state" hidden>音声を再生中・ミュート中のタブはありません。</p>
        <p id="tab-error" role="alert"></p>
      </section>

      <section aria-label="常時ミュート設定">
        <h2>常時ミュートするサイト</h2>
        <form id="add-host-form">
          <label for="host-input">ホスト名</label>
          <input id="host-input" type="text" placeholder="example.com" />
          <button type="submit">追加</button>
        </form>
        <ul id="host-list"></ul>
        <p id="host-error" role="alert"></p>
      </section>
    </main>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
